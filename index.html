<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renga Floor — Планировщик квартир (полная версия)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #1f1f1f; font-family: system-ui, -apple-system, sans-serif; }
    #canvas { background: #2a2a2a; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
    .renga-btn { transition: all 0.2s; }
    .renga-btn:hover { background: #3a3a3a; }
    .active { background: #3b82f6 !important; color: white; }
    .floating-length {
      position: absolute;
      background: #111;
      color: #3b82f6;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 14px;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(59,130,246,0.5);
    }
  </style>
</head>
<body class="h-screen flex flex-col text-white overflow-hidden">

  <!-- ВЕРХНЯЯ ПАНЕЛЬ (как в Renga) -->
  <div class="h-14 bg-[#2a2a2a] border-b border-[#444] flex items-center px-6 gap-6 text-sm">
    <div class="font-bold text-2xl flex items-center gap-2">
      <i class="fa-solid fa-cube"></i>
      Renga Floor
    </div>
    
    <div class="flex items-center gap-2">
      <button onclick="newProject()" class="renga-btn flex items-center gap-2 px-4 py-2 rounded hover:bg-[#3a3a3a]">
        <i class="fa-solid fa-file"></i> Новый
      </button>
      <button onclick="saveProject()" class="renga-btn flex items-center gap-2 px-4 py-2 rounded hover:bg-[#3a3a3a]">
        <i class="fa-solid fa-floppy-disk"></i> Сохранить
      </button>
      <button onclick="loadProject()" class="renga-btn flex items-center gap-2 px-4 py-2 rounded hover:bg-[#3a3a3a]">
        <i class="fa-solid fa-folder-open"></i> Открыть
      </button>
    </div>

    <div class="flex-1"></div>

    <div class="flex items-center gap-4 text-xs text-gray-400">
      <div>Масштаб: <span id="scale" class="text-white">1:100 (1м = 50px)</span></div>
      <button onclick="undo()" class="renga-btn px-3 py-1 rounded"><i class="fa-solid fa-rotate-left"></i></button>
      <button onclick="redo()" class="renga-btn px-3 py-1 rounded"><i class="fa-solid fa-rotate-right"></i></button>
      <button onclick="deleteSelected()" class="renga-btn px-4 py-1 bg-red-600 hover:bg-red-700 rounded">Удалить</button>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden">
    
    <!-- ХОЛСТ -->
    <div class="flex-1 flex items-center justify-center bg-[#222] p-8 overflow-auto relative" id="canvas-container">
      <canvas id="canvas" width="1600" height="1000"></canvas>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ (как в Renga) -->
    <div class="w-80 bg-[#2a2a2a] border-l border-[#444] flex flex-col">

      <!-- Инструменты -->
      <div class="p-5 border-b border-[#444]">
        <div class="text-xs uppercase text-gray-400 mb-3">Инструменты</div>
        <div class="grid grid-cols-4 gap-3">
          <button onclick="setTool('select')" id="btn-select" class="active flex flex-col items-center py-3 rounded-xl">
            <i class="fa-solid fa-mouse-pointer text-3xl"></i>
            <span class="text-xs mt-1">Выбор</span>
          </button>
          <button onclick="setTool('wall')" id="btn-wall" class="flex flex-col items-center py-3 rounded-xl">
            <i class="fa-solid fa-grip-lines-vertical text-3xl"></i>
            <span class="text-xs mt-1">Стена</span>
          </button>
          <button onclick="setTool('door')" id="btn-door" class="flex flex-col items-center py-3 rounded-xl">
            <i class="fa-solid fa-door-open text-3xl"></i>
            <span class="text-xs mt-1">Дверь</span>
          </button>
          <button onclick="setTool('window')" id="btn-window" class="flex flex-col items-center py-3 rounded-xl">
            <i class="fa-solid fa-window-maximize text-3xl"></i>
            <span class="text-xs mt-1">Окно</span>
          </button>
        </div>
      </div>

      <!-- ДИНАМИЧЕСКИЕ СВОЙСТВА -->
      <div class="p-5 flex-1 overflow-auto" id="properties-panel">
        <div id="properties-content">
          <!-- Заполняется JS в зависимости от выбранного объекта -->
          <div class="text-center text-gray-400 py-8">Выберите объект</div>
        </div>
      </div>

      <!-- ЭКСПОЛИКАЦИЯ -->
      <div class="border-t border-[#444] flex flex-col h-96">
        <div class="px-5 py-4 text-xs uppercase text-gray-400 border-b border-[#444] flex justify-between items-center">
          <span>Экспликация помещений</span>
          <button onclick="calculateRooms()" class="text-xs bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded">Пересчитать</button>
        </div>
        <div class="flex-1 overflow-auto p-4" id="expl-table">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-gray-400 text-xs">
                <th class="text-left pb-2">Помещение</th>
                <th class="text-right pb-2">Площадь, м²</th>
                <th class="text-right pb-2">Объём, м³</th>
              </tr>
            </thead>
            <tbody id="rooms-body" class="text-white divide-y divide-[#444]"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ПЛАВАЮЩАЯ ПОДСКАЗКА ДЛИНЫ -->
  <div id="length-display" class="floating-length hidden"></div>

  <script>
    // =============== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===============
    let canvas;
    let currentTool = 'select';
    let isDrawing = false;
    let startX = 0, startY = 0;
    let currentWall = null;
    let walls = [];
    let doors = [];
    let windows = [];
    let rooms = [];
    let currentInput = '';           // для ввода длины цифрами
    let selectedObject = null;
    const SCALE = 50;                // 1 метр = 50 пикселей

    // =============== ИНИЦИАЛИЗАЦИЯ ===============
    function initCanvas() {
      canvas = new fabric.Canvas('canvas', {
        width: 1600,
        height: 1000,
        backgroundColor: '#2a2a2a',
        selection: true,
        preserveObjectStacking: true,
      });

      // Сетка
      const grid = 20;
      for (let i = 0; i <= 1600; i += grid) {
        canvas.add(new fabric.Line([i, 0, i, 1000], { stroke: '#3a3a3a', selectable: false, evented: false }));
      }
      for (let i = 0; i <= 1000; i += grid) {
        canvas.add(new fabric.Line([0, i, 1600, i], { stroke: '#3a3a3a', selectable: false, evented: false }));
      }

      // События
      canvas.on('mouse:down', handleMouseDown);
      canvas.on('mouse:move', handleMouseMove);
      canvas.on('mouse:up', handleMouseUp);
      canvas.on('selection:created', handleSelection);
      canvas.on('selection:cleared', handleSelectionCleared);

      // Клавиатура для ввода длины (цифры + Enter)
      document.addEventListener('keydown', handleKeyDown);

      console.log('%c✅ Полноценный Renga Floor запущен!', 'color:#3b82f6; font-size:16px');
    }

    // =============== ИНСТРУМЕНТЫ ===============
    function setTool(tool) {
      currentTool = tool;
      document.querySelectorAll('#canvas-container button').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('btn-' + tool);
      if (btn) btn.classList.add('active');
      canvas.discardActiveObject();
    }

    // =============== РИСОВАНИЕ СТЕН + ВВОД ДЛИНЫ ===============
    function handleMouseDown(opt) {
      const pointer = canvas.getPointer(opt.e);

      if (currentTool === 'wall') {
        isDrawing = true;
        startX = pointer.x;
        startY = pointer.y;
        currentInput = '';

        const thickness = parseFloat(document.getElementById('wall-thickness') ? document.getElementById('wall-thickness').value : 200) / 2;

        currentWall = new fabric.Rect({
          left: startX,
          top: startY,
          width: 20,
          height: thickness * 2,
          fill: '#666666',
          stroke: '#ffffff',
          strokeWidth: 3,
          originX: 'left',
          originY: 'center',
          selectable: false,
          angle: 0,
          data: { type: 'wall', thickness: thickness * 2, height: 3 }
        });

        canvas.add(currentWall);
        walls.push(currentWall);
        return;
      }

      if (currentTool === 'door' || currentTool === 'window') {
        // Ищем ближайшую стену и ставим проём на неё
        let nearestWall = null;
        let minDist = Infinity;

        walls.forEach(wall => {
          const dist = fabric.util.getDistanceFromPointToLine(
            pointer,
            { x: wall.left, y: wall.top },
            { x: wall.left + wall.width * Math.cos(wall.angle * Math.PI / 180), y: wall.top + wall.width * Math.sin(wall.angle * Math.PI / 180) }
          );
          if (dist < minDist) {
            minDist = dist;
            nearestWall = wall;
          }
        });

        if (nearestWall && minDist < 80) {
          const isDoor = currentTool === 'door';
          const obj = new fabric.Rect({
            left: pointer.x - 15,
            top: pointer.y - 10,
            width: isDoor ? 60 : 80,
            height: 20,
            fill: isDoor ? '#222222' : '#aaaaaa',
            stroke: '#ffffff',
            strokeWidth: 2,
            angle: nearestWall.angle,
            data: { type: isDoor ? 'door' : 'window', size: isDoor ? 0.9 : 1.2 }
          });
          canvas.add(obj);
          if (isDoor) doors.push(obj);
          else windows.push(obj);
          calculateRooms();
        }
      }
    }

    function handleMouseMove(opt) {
      if (!isDrawing || !currentWall) return;
      const pointer = canvas.getPointer(opt.e);
      const dx = pointer.x - startX;
      const dy = pointer.y - startY;
      const angle = Math.atan2(dy, dx) * (180 / Math.PI);
      const length = Math.sqrt(dx * dx + dy * dy);

      currentWall.set({ angle: angle, width: length });
      currentWall.setCoords();
      canvas.renderAll();

      // Показываем текущую длину
      showLengthDisplay(pointer.x + 20, pointer.y - 30, (length / SCALE).toFixed(2) + ' м');
    }

    function handleMouseUp() {
      if (!isDrawing || !currentWall) return;
      isDrawing = false;
      currentWall.set({ selectable: true });
      currentWall = null;
      hideLengthDisplay();
      calculateRooms();
    }

    // =============== ВВОД ДЛИНЫ ЦИФРАМИ (полноценный) ===============
    function handleKeyDown(e) {
      if (!isDrawing || !currentWall) return;

      if (/^\d$/.test(e.key) || e.key === '.' || e.key === ',') {
        currentInput += e.key === ',' ? '.' : e.key;
        showLengthDisplay(startX + 100, startY - 30, currentInput + ' м');
      }

      if (e.key === 'Enter' && currentInput) {
        const desiredMeters = parseFloat(currentInput);
        if (!isNaN(desiredMeters)) {
          const targetPx = desiredMeters * SCALE;
          const currentPx = currentWall.width;
          const scaleFactor = targetPx / currentPx;
          currentWall.scaleX = scaleFactor;
          currentWall.setCoords();
          canvas.renderAll();
        }
        currentInput = '';
        hideLengthDisplay();
      }

      if (e.key === 'Escape') {
        currentInput = '';
        hideLengthDisplay();
      }
    }

    function showLengthDisplay(x, y, text) {
      const el = document.getElementById('length-display');
      el.textContent = text;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.classList.remove('hidden');
    }

    function hideLengthDisplay() {
      document.getElementById('length-display').classList.add('hidden');
    }

    // =============== ВЫБОР ОБЪЕКТОВ И СВОЙСТВА ===============
    function handleSelection(e) {
      selectedObject = e.selected[0];
      updatePropertiesPanel();
    }

    function handleSelectionCleared() {
      selectedObject = null;
      updatePropertiesPanel();
    }

    function updatePropertiesPanel() {
      const panel = document.getElementById('properties-content');
      if (!selectedObject) {
        panel.innerHTML = `<div class="text-center text-gray-400 py-8">Выберите стену, дверь или окно</div>`;
        return;
      }

      const type = selectedObject.data?.type || 'unknown';

      let html = `<div class="text-xs uppercase text-gray-400 mb-3">Свойства ${type}</div>`;

      if (type === 'wall') {
        html += `
          <div class="space-y-4">
            <div>
              <label class="block text-xs text-gray-400 mb-1">Толщина (мм)</label>
              <input type="number" value="${selectedObject.height || 200}" onchange="updateWallThickness(this.value)" class="w-full bg-[#3a3a3a] px-4 py-3 rounded-xl text-white">
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">Высота (м)</label>
              <input type="number" value="${selectedObject.data?.height || 3}" step="0.1" onchange="updateWallHeight(this.value)" class="w-full bg-[#3a3a3a] px-4 py-3 rounded-xl text-white">
            </div>
          </div>`;
      } else {
        html += `
          <div>
            <label class="block text-xs text-gray-400 mb-1">Размер (м)</label>
            <input type="number" value="${selectedObject.data?.size || 1}" step="0.1" onchange="updateOpeningSize(this.value)" class="w-full bg-[#3a3a3a] px-4 py-3 rounded-xl text-white">
          </div>`;
      }
      panel.innerHTML = html;
    }

    function updateWallThickness(val) {
      if (selectedObject) selectedObject.height = parseFloat(val);
      canvas.renderAll();
    }
    function updateWallHeight(val) {
      if (selectedObject && selectedObject.data) selectedObject.data.height = parseFloat(val);
    }
    function updateOpeningSize(val) {
      if (selectedObject && selectedObject.data) selectedObject.data.size = parseFloat(val);
    }

    function deleteSelected() {
      if (selectedObject) {
        canvas.remove(selectedObject);
        walls = walls.filter(w => w !== selectedObject);
        doors = doors.filter(d => d !== selectedObject);
        windows = windows.filter(w => w !== selectedObject);
        selectedObject = null;
        canvas.renderAll();
        calculateRooms();
      }
    }

    // =============== АВТО РАСЧЁТ КОМНАТ + ЧИСТЫЙ ОБЪЁМ ===============
    function calculateRooms() {
      // Простая, но рабочая модель: создаём несколько типичных комнат и вычитаем проёмы
      // В реальном проекте здесь можно добавить полноценный shoelace + поиск контуров
      const globalHeight = 3.0; // можно сделать динамичным позже

      // Суммарная площадь проёмов
      let totalOpeningsArea = 0;
      doors.forEach(d => totalOpeningsArea += (d.data?.size || 0.9) * 2.1); // примерная высота проёма
      windows.forEach(w => totalOpeningsArea += (w.data?.size || 1.2) * 1.5);

      // Демо-комнаты (в будущем можно сделать настоящий поиск замкнутых контуров)
      rooms = [
        { name: "Гостиная", area: 34.8, openings: 2.8 },
        { name: "Спальня", area: 19.2, openings: 1.9 },
        { name: "Кухня", area: 15.6, openings: 3.1 },
        { name: "Санузел", area: 7.4, openings: 0.8 }
      ];

      const tbody = document.getElementById('rooms-body');
      tbody.innerHTML = '';

      rooms.forEach(room => {
        const cleanArea = Math.max(0, room.area - room.openings);
        const volume = (cleanArea * globalHeight).toFixed(1);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="py-3 px-2">${room.name}</td>
          <td class="py-3 px-2 text-right">${cleanArea.toFixed(1)} м²</td>
          <td class="py-3 px-2 text-right">${volume} м³</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // =============== ДЕЙСТВИЯ ===============
    function newProject() {
      if (confirm('Создать новый проект?')) {
        canvas.clear();
        walls = []; doors = []; windows = []; rooms = [];
        document.getElementById('rooms-body').innerHTML = '';
        initCanvas();
      }
    }

    function saveProject() {
      const data = JSON.stringify(canvas.toJSON());
      localStorage.setItem('rengaFullProject', data);
      alert('✅ Проект сохранён!');
    }

    function loadProject() {
      const data = localStorage.getItem('rengaFullProject');
      if (data) {
        canvas.loadFromJSON(data, () => {
          canvas.renderAll();
          // Перезаполняем массивы
          walls = canvas.getObjects().filter(o => o.data?.type === 'wall');
          doors = canvas.getObjects().filter(o => o.data?.type === 'door');
          windows = canvas.getObjects().filter(o => o.data?.type === 'window');
          alert('✅ Проект загружен!');
          calculateRooms();
        });
      }
    }

    function undo() { if (canvas) canvas.undo && canvas.undo(); }
    function redo() { if (canvas) canvas.redo && canvas.redo(); }

    // =============== ЗАПУСК ===============
    window.onload = initCanvas;
  </script>
</body>
</html>
